spring:
  # Enable Java 21 virtual threads for Tomcat request handling (Requirement 11.1)
  threads:
    virtual:
      enabled: true

  # Relational datasource — replace placeholders with real values before deployment
  datasource:
    url: jdbc:postgresql://localhost:5432/orderprocessing
    username: orderprocessing_user
    password: changeme
    driver-class-name: org.postgresql.Driver

  # Redis cache-aside layer (Requirement 9, 10)
  data:
    redis:
      host: localhost
      port: 6379

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# Resilience4j circuit-breaker configuration (Requirement 12)
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - org.springframework.web.client.RestClientException
      payment:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 40
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - org.springframework.web.client.RestClientException
      cache:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true

# Application-specific settings
app:
  cache:
    order:
      # TTL for cached Order entries in Redis (Requirement 10.2)
      ttl: 5m

  # External inventory provider base URL (Requirement 4.1, 13.5)
  inventory:
    base-url: http://localhost:9001

  # External payment provider base URL (Requirement 5.1, 13.5)
  payment:
    base-url: http://localhost:9002

# Actuator endpoints (Requirement 16.2, 16.3)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
