spring:
  # Disable all database and JPA auto-configuration — demo uses in-memory stubs only
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.sql.init.SqlInitializationAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # Suppress the Spring Boot banner for cleaner demo output
  main:
    banner-mode: off

# Disable Resilience4j circuit breakers in demo (no real HTTP calls)
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        slidingWindowSize: 100
        minimumNumberOfCalls: 100
      payment:
        slidingWindowSize: 100
        minimumNumberOfCalls: 100
      cache:
        slidingWindowSize: 100
        minimumNumberOfCalls: 100

# Quiet down most Spring noise, show only demo output
logging:
  level:
    root: WARN
    com.example.orderprocessing.demo: INFO
    com.example.orderprocessing.application.OrderService: INFO
    com.example.orderprocessing.infrastructure.notification: INFO
