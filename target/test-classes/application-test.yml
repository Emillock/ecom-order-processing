spring:
  # H2 in-memory datasource for @DataJpaTest slices (no Testcontainers needed for slice tests)
  datasource:
    url: jdbc:h2:mem:orderprocessing_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # Drop and recreate schema on each test run
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  # Redis test configuration — embedded Redis started by test infrastructure
  data:
    redis:
      host: localhost
      port: 6370

# Disable circuit breakers in unit/slice tests to avoid state bleed
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        slidingWindowSize: 100
        minimumNumberOfCalls: 100
      payment:
        slidingWindowSize: 100
        minimumNumberOfCalls: 100
      cache:
        slidingWindowSize: 100
        minimumNumberOfCalls: 100
